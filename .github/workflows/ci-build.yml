name: CI Build

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/ci-build.yml"
      - "run.sh"

jobs:
  build-linux:
    name: Build and Test - Linux (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          
      - name: Install jbundle from source
        run: |
          git clone https://github.com/avelino/jbundle.git /tmp/jbundle
          cd /tmp/jbundle
          cargo install --path .
          
      - name: Build with jbundle
        run: |
          mkdir -p dist
          jbundle build --input . --output dist/SpriteLab --java-version 21 --target linux-x64 --profile cli
        
      - name: Verify jbundle binary was created
        run: |
          if [ ! -f dist/SpriteLab ]; then
            echo "Error: jbundle binary SpriteLab was not created"
            exit 1
          fi
          echo "jbundle binary created successfully"
          ls -lh dist/SpriteLab
          file dist/SpriteLab
          
      - name: Test binary launches (headless)
        run: |
          # Install Xvfb for headless testing of JavaFX GUI
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0
          
          # Make binary executable
          chmod +x dist/SpriteLab
          
          # Try to launch the app in headless mode with timeout
          # JavaFX apps will start and we can verify no immediate crashes
          echo "Testing binary launch..."
          timeout 10s xvfb-run -a dist/SpriteLab &
          LAUNCH_PID=$!
          sleep 5
          
          # Check if process is still running (means it started successfully)
          if ps -p $LAUNCH_PID > /dev/null 2>&1; then
            echo "✓ Binary launched successfully and is running"
            kill $LAUNCH_PID || true
            exit 0
          else
            # Check if it exited with error
            wait $LAUNCH_PID
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              # Timeout means it was still running - success!
              echo "✓ Binary launched successfully (timed out as expected)"
              exit 0
            else
              echo "✗ Binary failed to launch or crashed immediately (exit code: $EXIT_CODE)"
              exit 1
            fi
          fi
        
      - name: Download FFmpeg for Linux
        run: |
          mkdir -p staging/bin
          wget -O ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg.tar.xz
          mv ffmpeg-*-amd64-static/ffmpeg staging/bin/ffmpeg
          chmod +x staging/bin/ffmpeg
          rm -rf ffmpeg.tar.xz ffmpeg-*-amd64-static
          
      - name: Verify FFmpeg
        run: |
          if [ ! -f staging/bin/ffmpeg ]; then
            echo "Error: FFmpeg binary not found"
            exit 1
          fi
          ./staging/bin/ffmpeg -version | head -1
          
      - name: Copy artifacts
        run: |
          cp dist/SpriteLab staging/SpriteLab
          cp run-native.sh staging/ || true
          cp README.md staging/ || cp Readme.md staging/ || true
          cp LICENSE staging/ || true
          chmod +x staging/SpriteLab staging/run-native.sh || true
          
      - name: Create test package
        run: |
          cd staging
          tar -czf SpriteLab-Linux-amd64.tar.gz *
          mv SpriteLab-Linux-amd64.tar.gz ..
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpriteLab-Linux-amd64
          path: SpriteLab-Linux-amd64.tar.gz
          retention-days: 7
          
      - name: Clean staging
        run: rm -fr staging

  build-macos:
    name: Build and Test - macOS (arm64)
    runs-on: macos-14  # macOS 14 runs on Apple Silicon (arm64)
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          
      - name: Install jbundle from source
        run: |
          git clone https://github.com/avelino/jbundle.git /tmp/jbundle
          cd /tmp/jbundle
          cargo install --path .
          
      - name: Build with jbundle
        run: |
          mkdir -p dist
          jbundle build --input . --output dist/SpriteLab --java-version 21 --target macos-aarch64 --profile cli
        
      - name: Verify jbundle binary was created
        run: |
          if [ ! -f dist/SpriteLab ]; then
            echo "Error: jbundle binary SpriteLab was not created"
            exit 1
          fi
          echo "jbundle binary created successfully"
          ls -lh dist/SpriteLab
          file dist/SpriteLab
          
      - name: Test binary launches
        run: |
          # Make binary executable
          chmod +x dist/SpriteLab
          
          # Try to launch the app with timeout
          # On macOS, JavaFX apps can run in headless-ish mode
          echo "Testing binary launch..."
          timeout 10s dist/SpriteLab &
          LAUNCH_PID=$!
          sleep 5
          
          # Check if process is still running (means it started successfully)
          if ps -p $LAUNCH_PID > /dev/null 2>&1; then
            echo "✓ Binary launched successfully and is running"
            kill $LAUNCH_PID || true
            exit 0
          else
            # Check if it exited with error
            wait $LAUNCH_PID
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              # Timeout means it was still running - success!
              echo "✓ Binary launched successfully (timed out as expected)"
              exit 0
            else
              echo "✗ Binary failed to launch or crashed immediately (exit code: $EXIT_CODE)"
              exit 1
            fi
          fi
        
      - name: Download FFmpeg for macOS ARM64
        run: |
          mkdir -p staging/bin
          # Download FFmpeg static build for macOS ARM64
          # Note: This URL redirects to the latest version. For production use,
          # consider pinning to a specific version URL with checksum verification.
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip
          unzip -j ffmpeg.zip -d staging/bin/
          chmod +x staging/bin/ffmpeg
          rm ffmpeg.zip
          
      - name: Verify FFmpeg
        run: |
          if [ ! -f staging/bin/ffmpeg ]; then
            echo "Error: FFmpeg binary not found"
            exit 1
          fi
          ./staging/bin/ffmpeg -version | head -1
          
      - name: Copy artifacts
        run: |
          cp dist/SpriteLab staging/SpriteLab
          cp run-native.sh staging/ || true
          cp README.md staging/ || cp Readme.md staging/ || true
          cp LICENSE staging/ || true
          chmod +x staging/SpriteLab staging/run-native.sh || true
          
      - name: Create test package
        run: |
          cd staging
          tar -czf SpriteLab-macOS-arm64.tar.gz *
          mv SpriteLab-macOS-arm64.tar.gz ..
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpriteLab-macOS-arm64
          path: SpriteLab-macOS-arm64.tar.gz
          retention-days: 7
          
      - name: Clean staging
        run: rm -fr staging

  build-windows:
    name: Build and Test - Windows (x64)
    runs-on: windows-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          
      - name: Install jbundle from source
        run: |
          git clone https://github.com/avelino/jbundle.git C:\tmp\jbundle
          cd C:\tmp\jbundle
          cargo install --path .
        shell: pwsh
          
      - name: Build with jbundle
        run: |
          New-Item -ItemType Directory -Force -Path dist
          jbundle build --input . --output dist/SpriteLab.exe --java-version 21 --target windows-x64 --profile cli
        shell: pwsh
        
      - name: Verify jbundle binary was created
        run: |
          if (-not (Test-Path dist/SpriteLab.exe)) {
            Write-Error "Error: jbundle binary SpriteLab.exe was not created"
            exit 1
          }
          Write-Host "jbundle binary created successfully"
          Get-Item dist/SpriteLab.exe
        shell: pwsh
          
      - name: Download FFmpeg for Windows
        run: |
          New-Item -ItemType Directory -Force -Path staging/bin
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          Move-Item ffmpeg-*-essentials_build/bin/ffmpeg.exe staging/bin/ffmpeg.exe
          Remove-Item ffmpeg.zip
          Remove-Item -Recurse ffmpeg-*-essentials_build
        shell: pwsh
          
      - name: Verify FFmpeg
        run: |
          if (-not (Test-Path staging/bin/ffmpeg.exe)) {
            Write-Error "Error: FFmpeg binary not found"
            exit 1
          }
          & staging/bin/ffmpeg.exe -version | Select-Object -First 1
        shell: pwsh
          
      - name: Copy artifacts
        run: |
          Copy-Item dist/SpriteLab.exe staging/SpriteLab.exe
          if (Test-Path README.md) { Copy-Item README.md staging/ }
          if (Test-Path Readme.md) { Copy-Item Readme.md staging/README.md }
          if (Test-Path LICENSE) { Copy-Item LICENSE staging/ }
        shell: pwsh
          
      - name: Create test package
        run: |
          Compress-Archive -Path staging/* -DestinationPath SpriteLab-Windows-x64.zip
        shell: pwsh
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpriteLab-Windows-x64
          path: SpriteLab-Windows-x64.zip
          retention-days: 7
          
      - name: Clean staging
        run: Remove-Item -Recurse -Force staging
        shell: pwsh
