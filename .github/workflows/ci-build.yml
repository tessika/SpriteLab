name: CI Build

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/ci-build.yml"
      - "run.sh"

jobs:
  build-linux:
    name: Build and Test - Linux (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          
      - name: Install jbundle from source
        run: |
          git clone https://github.com/avelino/jbundle.git /tmp/jbundle
          cd /tmp/jbundle
          cargo install --path .
          
      - name: Build with jbundle
        run: |
          mkdir -p dist
          jbundle build --input . --output dist/SpriteLab --java-version 21 --target linux-x64 --profile cli
        
      - name: Verify jbundle binary was created
        run: |
          if [ ! -f dist/SpriteLab ]; then
            echo "Error: jbundle binary SpriteLab was not created"
            exit 1
          fi
          echo "jbundle binary created successfully"
          ls -lh dist/SpriteLab
          file dist/SpriteLab
        
      - name: Download FFmpeg for Linux
        run: |
          mkdir -p staging/bin
          wget -O ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg.tar.xz
          mv ffmpeg-*-amd64-static/ffmpeg staging/bin/ffmpeg
          chmod +x staging/bin/ffmpeg
          rm -rf ffmpeg.tar.xz ffmpeg-*-amd64-static
          
      - name: Verify FFmpeg
        run: |
          if [ ! -f staging/bin/ffmpeg ]; then
            echo "Error: FFmpeg binary not found"
            exit 1
          fi
          ./staging/bin/ffmpeg -version | head -1
          
      - name: Copy artifacts
        run: |
          cp dist/SpriteLab staging/SpriteLab
          cp run-native.sh staging/ || true
          cp README.md staging/ || cp Readme.md staging/ || true
          cp LICENSE staging/ || true
          chmod +x staging/SpriteLab staging/run-native.sh || true
          
      - name: Create test package
        run: |
          cd staging
          tar -czf SpriteLab-Linux-amd64.tar.gz *
          mv SpriteLab-Linux-amd64.tar.gz ..
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpriteLab-Linux-amd64
          path: SpriteLab-Linux-amd64.tar.gz
          retention-days: 7
          
      - name: Clean staging
        run: rm -fr staging

  build-macos:
    name: Build and Test - macOS (arm64)
    runs-on: macos-14  # macOS 14 runs on Apple Silicon (arm64)
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          
      - name: Install jbundle from source
        run: |
          git clone https://github.com/avelino/jbundle.git /tmp/jbundle
          cd /tmp/jbundle
          cargo install --path .
          
      - name: Build with jbundle
        run: |
          mkdir -p dist
          jbundle build --input . --output dist/SpriteLab --java-version 21 --target macos-aarch64 --profile cli
        
      - name: Verify jbundle binary was created
        run: |
          if [ ! -f dist/SpriteLab ]; then
            echo "Error: jbundle binary SpriteLab was not created"
            exit 1
          fi
          echo "jbundle binary created successfully"
          ls -lh dist/SpriteLab
          file dist/SpriteLab
        
      - name: Download FFmpeg for macOS ARM64
        run: |
          mkdir -p staging/bin
          # Download FFmpeg static build for macOS ARM64
          # Note: This URL redirects to the latest version. For production use,
          # consider pinning to a specific version URL with checksum verification.
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip
          unzip -j ffmpeg.zip -d staging/bin/
          chmod +x staging/bin/ffmpeg
          rm ffmpeg.zip
          
      - name: Verify FFmpeg
        run: |
          if [ ! -f staging/bin/ffmpeg ]; then
            echo "Error: FFmpeg binary not found"
            exit 1
          fi
          ./staging/bin/ffmpeg -version | head -1
          
      - name: Copy artifacts
        run: |
          cp dist/SpriteLab staging/SpriteLab
          cp run-native.sh staging/ || true
          cp README.md staging/ || cp Readme.md staging/ || true
          cp LICENSE staging/ || true
          chmod +x staging/SpriteLab staging/run-native.sh || true
          
      - name: Create test package
        run: |
          cd staging
          tar -czf SpriteLab-macOS-arm64.tar.gz *
          mv SpriteLab-macOS-arm64.tar.gz ..
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpriteLab-macOS-arm64
          path: SpriteLab-macOS-arm64.tar.gz
          retention-days: 7
          
      - name: Clean staging
        run: rm -fr staging
