name: Release Builds

on:
  release:
    types: [published]

jobs:
  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to upload release assets
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          
      - name: Build with Maven
        run: mvn clean package -DskipTests
        
      - name: Download FFmpeg for Linux
        run: |
          mkdir -p bin
          wget -O ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg.tar.xz
          mv ffmpeg-*-amd64-static/ffmpeg bin/ffmpeg
          chmod +x bin/ffmpeg
          rm -rf ffmpeg.tar.xz ffmpeg-*-amd64-static
          
      - name: Create release package
        run: |
          mkdir -p release/SpriteLab-Linux-amd64
          cp target/SpriteLab.jar release/SpriteLab-Linux-amd64/
          cp -r bin release/SpriteLab-Linux-amd64/
          cp run.sh release/SpriteLab-Linux-amd64/
          cp README.md release/SpriteLab-Linux-amd64/ || cp Readme.md release/SpriteLab-Linux-amd64/ || true
          cp LICENSE release/SpriteLab-Linux-amd64/ || true
          cd release
          tar -czf SpriteLab-Linux-amd64.tar.gz SpriteLab-Linux-amd64
          
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/SpriteLab-Linux-amd64.tar.gz

  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-14  # macOS 14 runs on Apple Silicon (arm64)
    permissions:
      contents: write  # Required to upload release assets
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          
      - name: Build with Maven
        run: mvn clean package -DskipTests
        
      - name: Download FFmpeg for macOS ARM64
        run: |
          mkdir -p bin
          # Download FFmpeg static build for macOS ARM64
          wget -O ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip
          unzip -j ffmpeg.zip -d bin/
          chmod +x bin/ffmpeg
          rm ffmpeg.zip
          
      - name: Create release package
        run: |
          mkdir -p release/SpriteLab-macOS-arm64
          cp target/SpriteLab.jar release/SpriteLab-macOS-arm64/
          cp -r bin release/SpriteLab-macOS-arm64/
          cp run.sh release/SpriteLab-macOS-arm64/
          cp README.md release/SpriteLab-macOS-arm64/ || cp Readme.md release/SpriteLab-macOS-arm64/ || true
          cp LICENSE release/SpriteLab-macOS-arm64/ || true
          cd release
          tar -czf SpriteLab-macOS-arm64.tar.gz SpriteLab-macOS-arm64
          
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/SpriteLab-macOS-arm64.tar.gz
